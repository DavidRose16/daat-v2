<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Daat</title>
<link rel="icon" href="/assets/Daat-Logo.png" type="image/png">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --layer-1: #1B3D2F;
  --layer-2: #2D5A47;
  --layer-3: #7FCFAA;
  --layer-tint: #E8F5EF;
  --bg: #FAF9F6;
  --surface: #FFFFFF;
  --border: #E5E3DC;
  --border-strong: #D1CEC4;
  --ink: #1A1D1F;
  --ink-2: #4A4E52;
  --ink-3: #7A7E82;
  --ink-4: #AAADB0;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html,body{
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.login-container {
  width: 100%;
  max-width: 380px;
  padding: 32px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 48px;
}
.brand-mark {
  width: 24px;
  height: 24px;
  object-fit: contain;
}
.brand-word {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.heading {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 10px;
}
.subheading {
  font-size: 15px;
  color: var(--ink-3);
  margin-bottom: 36px;
  line-height: 1.5;
}

.google-btn {
  width: 100%;
  padding: 14px 20px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: border-color 0.12s;
}
.google-btn:hover { border-color: var(--ink); }
.google-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.google-icon { width: 18px; height: 18px; flex-shrink: 0; }

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 28px 0;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider-text {
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.email-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.email-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.12s;
}
.email-input:focus { border-color: var(--layer-2); }
.email-input::placeholder { color: var(--ink-4); }

.magic-btn {
  width: 100%;
  padding: 14px 20px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--ink-2);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.magic-btn:hover { border-color: var(--ink); color: var(--ink); }
.magic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.msg {
  font-size: 13px;
  padding: 14px 16px;
  margin-top: 16px;
  line-height: 1.5;
  display: none;
}
.msg.ok {
  display: block;
  background: var(--layer-tint);
  color: var(--layer-1);
  border: 1px solid var(--layer-2);
}
.msg.err {
  display: block;
  background: #FCEDEB;
  color: #B4261F;
  border: 1px solid #E59A94;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="brand">
    <img class="brand-mark" src="/assets/Daat-Logo.png" alt="">
    <span class="brand-word">Daat</span>
  </div>
  
  <div class="heading">Sign in</div>
  <div class="subheading">Your organizational intelligence workspace.</div>

  <button class="google-btn" id="googleBtn">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>

  <form class="email-form" id="emailForm">
    <input class="email-input" id="emailInput" type="email" placeholder="your@email.com" autocomplete="email" required>
    <button class="magic-btn" type="submit" id="magicBtn">Send magic link</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL  = 'https://wkimwkhysvvkrujsefyv.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraW13a2h5c3Z2a3J1anNlZnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzA1ODMsImV4cCI6MjA4OTQ0NjU4M30.5VqJrBgElAzrkWnsT3Kza0tFlwUvYSMrv-lbgnpBymM';

const sb = window.supabase.createClient(SB_URL, SB_ANON);

function getNext() {
  const p = new URLSearchParams(window.location.search);
  const n = p.get('next');
  return n && n.startsWith('/') ? n : '/';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}

sb.auth.onAuthStateChange((_event, session) => {
  if (session) window.location.href = getNext();
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = getNext();
})();

document.getElementById('googleBtn').addEventListener('click', async () => {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  try {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + getNext() },
    });
    if (error) throw error;
  } catch (e) {
    showMsg(e.message, 'err');
    btn.disabled = false;
  }
});

document.getElementById('emailForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  const btn   = document.getElementById('magicBtn');
  btn.disabled = true;
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + getNext() },
    });
    if (error) throw error;
    showMsg('Magic link sent — check your email.', 'ok');
  } catch (err) {
    showMsg(err.message, 'err');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
