<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask — Daat</title>
<link rel="icon" href="/assets/Daat-Logo.png" type="image/png">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/assets/daat-ui.css">
<style>
  .ask-main {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 48px;
  }

  .ask-header {
    padding: 100px 0 64px;
  }
  .ask-header .eyebrow { margin-bottom: 20px; }
  .ask-header .page-title { 
    margin-bottom: 0;
    font-size: clamp(32px, 5vw, 44px);
  }

  .ask-form {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .field-question {
    font-size: 17px;
    padding: 22px 26px;
    min-height: 140px;
    border-color: var(--border);
    background: var(--surface);
    resize: none;
    line-height: 1.6;
  }
  .field-question:focus {
    border-color: var(--layer-1);
    box-shadow: none;
    outline: none;
  }
  .field-question::placeholder {
    color: var(--ink-4);
  }

  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .intent-group {
    display: flex;
    gap: 6px;
  }
  .intent-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 8px 14px;
    background: var(--surface);
    color: var(--ink-3);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all var(--t-fast);
  }
  .intent-btn:hover { color: var(--ink); border-color: var(--border-strong); }
  .intent-btn.selected { 
    background: var(--layer-1); 
    color: var(--ink-inverse); 
    border-color: var(--layer-1);
  }

  .ask-submit {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .ask-hint {
    font-size: 12px;
    color: var(--ink-4);
  }
  .ask-hint kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 5px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--ink-3);
  }

  .ask-btn {
    min-width: 120px;
  }
  .ask-btn .spinner { 
    width: 14px; 
    height: 14px; 
    display: none; 
    border-color: rgba(250,249,246,0.3); 
    border-top-color: var(--ink-inverse); 
  }
  .ask-btn.running .spinner { display: block; }
  .ask-btn.running .ask-label { display: none; }

  /* Entities input — refined */
  .entities-row {
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .entities-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .entities-label span { font-weight: 400; letter-spacing: 0; text-transform: none; }
  .entities-input {
    width: 100%;
    background: transparent;
    border: none;
    padding: 8px 0;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .entities-input::placeholder { color: var(--ink-4); }

  /* Result area */
  .result-area {
    display: none;
    margin-top: 80px;
    padding-top: 56px;
    border-top: 2px solid var(--layer-1);
  }
  .result-area.visible { display: block; }

  .result-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--layer-2);
    margin-bottom: 20px;
  }

  .summary-text {
    font-size: 20px;
    line-height: 1.65;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 40px;
  }

  .priority-card {
    display: none;
    background: var(--layer-tint);
    border-left: 2px solid var(--layer-1);
    padding: 22px 26px;
    margin-bottom: 40px;
  }
  .priority-card.visible { display: block; }
  .priority-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--layer-1);
    margin-bottom: 10px;
  }
  .priority-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
  }

  /* Context details */
  details.context-details {
    margin-bottom: 24px;
    border-top: 1px solid var(--border);
  }
  details.context-details > summary {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
    user-select: none;
    transition: color var(--t-fast);
  }
  details.context-details > summary:hover { color: var(--ink); }
  details.context-details > summary::-webkit-details-marker { display: none; }
  .summary-arrow {
    font-size: 10px;
    transition: transform var(--t-fast);
    display: inline-block;
  }
  details.context-details[open] .summary-arrow { transform: rotate(90deg); }

  .context-inner {
    padding: 0 0 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .ctx-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .ctx-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .ctx-list li {
    font-size: 14px;
    color: var(--ink);
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    line-height: 1.55;
  }
  .ctx-prose {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.65;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .result-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .conf-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border-strong);
  }
  .conf-high   { color: var(--layer-1); border-color: var(--layer-2); background: var(--layer-tint); }
  .conf-medium { color: var(--warn); border-color: #D9B778; background: var(--warn-bg); }
  .conf-low    { color: var(--danger); border-color: #E59A94; background: var(--danger-bg); }

  .source-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .source-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .error-box {
    display: none;
    border-left: 2px solid var(--danger);
    background: var(--danger-bg);
    color: var(--danger);
    padding: 18px 22px;
    font-size: 14px;
    line-height: 1.55;
    margin: 48px 0;
  }
  .error-box.visible { display: block; }

  @media (max-width: 640px) {
    .ask-main { padding: 0 24px; }
    .ask-header { padding: 60px 0 40px; }
    .summary-text { font-size: 18px; }
    .form-options { flex-direction: column; align-items: flex-start; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div id="daat-shell"></div>

<main class="ask-main">

  <header class="ask-header">
    <div class="eyebrow">Ask</div>
    <h1 class="page-title">What do you need to understand?</h1>
  </header>

  <div class="ask-form" id="askForm">

    <div>
      <textarea class="field-question" id="taskInput" placeholder="Describe what you want to know. Daat reads across your connected sources and returns a grounded briefing."></textarea>
    </div>

    <div class="form-options">
      <div class="intent-group" id="intentGroup">
        <button class="intent-btn selected" data-intent="inform">Inform</button>
        <button class="intent-btn" data-intent="decide">Decide</button>
        <button class="intent-btn" data-intent="diagnose">Diagnose</button>
        <button class="intent-btn" data-intent="plan">Plan</button>
      </div>

      <div class="ask-submit">
        <span class="ask-hint"><kbd>Cmd</kbd> + <kbd>Enter</kbd></span>
        <button class="btn btn-primary ask-btn" id="askBtn">
          <span class="ask-label">Ask</span>
          <span class="spinner"></span>
        </button>
      </div>
    </div>

    <div class="entities-row">
      <div class="entities-label">Focus <span>optional</span></div>
      <input class="entities-input" id="entitiesInput" type="text" placeholder="People, topics, or systems — comma separated">
    </div>

  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-area" id="resultArea">
    <div class="result-eyebrow">Briefing</div>
    <p class="summary-text" id="summaryText"></p>

    <div class="priority-card" id="priorityCard">
      <div class="priority-label">Priority</div>
      <p class="priority-text" id="priorityText"></p>
    </div>

    <details class="context-details" id="contextDetails">
      <summary><span class="summary-arrow">›</span> Context &amp; Grounding</summary>
      <div class="context-inner" id="contextInner"></div>
    </details>

    <div class="result-footer" id="resultFooter"></div>
  </div>

</main>

<script>
let _auth = null;
let selectedIntent = 'inform';

async function init() {
  daatShell({ active: 'ask' });

  _auth = await daatGetAuth();
  if (!_auth) return;

  if (_auth.onboardingState !== 'ready') {
    const dest =
      _auth.onboardingState === 'processing' ? '/processing' :
      _auth.onboardingState === 'connect'    ? '/connect' :
                                               '/welcome';
    window.location.replace(dest);
    return;
  }

  document.getElementById('intentGroup').addEventListener('click', e => {
    const btn = e.target.closest('.intent-btn');
    if (!btn) return;
    document.querySelectorAll('.intent-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedIntent = btn.dataset.intent;
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') ask();
  });

  document.getElementById('askBtn').addEventListener('click', ask);
}

async function ask() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) return;

  const entities = document.getElementById('entitiesInput').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const btn       = document.getElementById('askBtn');
  const errorBox  = document.getElementById('errorBox');
  const resultArea = document.getElementById('resultArea');

  btn.disabled = true;
  btn.classList.add('running');
  errorBox.classList.remove('visible');
  resultArea.classList.remove('visible');

  try {
    const res = await fetch(`${FN_URL}/synthesize`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${_auth.token}`,
        'apikey': SB_ANON,
      },
      body: JSON.stringify({ task, entities, intent: selectedIntent }),
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || data.message || `HTTP ${res.status}`);

    renderResult(data);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.classList.remove('running');
  }
}

function renderResult(d) {
  const ctx = d.context || {};

  document.getElementById('summaryText').textContent = d.summary || '';

  const pc = ctx.priority_context;
  const card = document.getElementById('priorityCard');
  if (pc && typeof pc === 'string') {
    document.getElementById('priorityText').textContent = pc;
    card.classList.add('visible');
  } else {
    card.classList.remove('visible');
  }

  const inner = document.getElementById('contextInner');
  inner.innerHTML = '';

  const sections = [
    { key: 'decisions',     label: 'Decisions',    list: true  },
    { key: 'people',        label: 'People',        list: true  },
    { key: 'workflows',     label: 'Workflows',     list: true  },
    { key: 'problems',      label: 'Problems',      list: true  },
    { key: 'tacit_context', label: 'Tacit context', list: false },
    { key: 'uncertainty',   label: 'Uncertainty',   list: false },
  ];

  let hasContent = false;
  for (const s of sections) {
    const val = ctx[s.key];
    if (!val || (Array.isArray(val) && val.length === 0)) continue;
    hasContent = true;

    const wrap  = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'ctx-section-title';
    title.textContent = s.label;
    wrap.appendChild(title);

    if (s.list && Array.isArray(val)) {
      const ul = document.createElement('ul');
      ul.className = 'ctx-list';
      for (const item of val) {
        const li = document.createElement('li');
        li.textContent = typeof item === 'string' ? item : JSON.stringify(item);
        ul.appendChild(li);
      }
      wrap.appendChild(ul);
    } else if (typeof val === 'string') {
      const p = document.createElement('p');
      p.className = 'ctx-prose';
      p.textContent = val;
      wrap.appendChild(p);
    }
    inner.appendChild(wrap);
  }

  const details = document.getElementById('contextDetails');
  details.style.display = hasContent ? '' : 'none';

  const footer = document.getElementById('resultFooter');
  footer.innerHTML = '';
  if (d.confidence) {
    const badge = document.createElement('span');
    badge.className = `conf-badge conf-${d.confidence}`;
    badge.textContent = `${d.confidence} confidence`;
    footer.appendChild(badge);
  }
  if (Array.isArray(d.sources) && d.sources.length > 0) {
    const tags = document.createElement('div');
    tags.className = 'source-tags';
    for (const src of d.sources) {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = src;
      tags.appendChild(tag);
    }
    footer.appendChild(tags);
  }

  document.getElementById('resultArea').classList.add('visible');
}

init();
</script>
</body>
</html>
