<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect — Daat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #111;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e2e2e2;
  --text-dim: #888;
  --text-dimmer: #555;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }

/* Nav */
.nav { display: flex; align-items: center; background: #0a0a0a; border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 50; }
.nav-brand { font-size: 14px; font-weight: 700; letter-spacing: 0.01em; color: var(--text); padding: 12px 20px 12px 0; border-right: 1px solid var(--border); margin-right: 4px; flex-shrink: 0; }
.nav-tab { font-size: 12px; font-weight: 500; padding: 14px 16px; color: var(--text-dimmer); text-decoration: none; border-bottom: 2px solid transparent; transition: color .12s, border-color .12s; white-space: nowrap; }
.nav-tab:hover { color: var(--text-dim); }
.nav-tab.active { color: var(--text); border-bottom-color: #555; }
.nav-spacer { flex: 1; }

/* Page */
.page { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

/* Ready banner */
.ready-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: #0a140a;
  border: 1px solid #1a3a1a;
  border-radius: 9px;
  padding: 14px 20px;
  margin-bottom: 36px;
}
.ready-banner.visible { display: flex; }
.ready-text { font-size: 13px; color: #4ade80; font-weight: 500; }
.ready-link {
  font-size: 13px; font-weight: 600; color: #4ade80;
  text-decoration: none; white-space: nowrap;
  padding: 6px 16px; border: 1px solid #1a4d2e; border-radius: 6px;
  background: #0d2b1a; transition: background .12s;
}
.ready-link:hover { background: #122e1e; }

/* Page heading */
.page-heading { margin-bottom: 32px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); margin-bottom: 8px; }
.page-sub { font-size: 13px; color: var(--text-dimmer); line-height: 1.6; max-width: 480px; }

/* Source grid */
.sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

/* Source card */
.src-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  transition: border-color .15s;
}
.src-card.connected { border-color: #1a3a1a; }

.src-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.src-name { font-size: 15px; font-weight: 600; color: var(--text); }
.src-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 9px;
  border-radius: 5px; white-space: nowrap;
}
.src-badge.on  { background: #0d2b1a; color: #4ade80; border: 1px solid #1a4d2e; }
.src-badge.off { background: #1a1a1a; color: #555;    border: 1px solid #2a2a2a; }

.src-desc { font-size: 12px; color: var(--text-dimmer); line-height: 1.55; margin-bottom: 14px; }

.src-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
.src-meta-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.src-meta-label { font-size: 11px; color: #444; }
.src-meta-value { font-size: 12px; color: var(--text-dim); text-align: right; word-break: break-all; }
.src-meta-value.prominent { color: var(--text); font-weight: 500; }

/* Actions */
.src-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn-connect {
  padding: 7px 16px; font-size: 12px; font-weight: 600;
  border-radius: 6px; border: 1px solid #1e4d6e; background: #0a2a40;
  color: #60c8f8; cursor: pointer; transition: background .12s;
}
.btn-connect:hover { background: #0d3352; }
.btn-sync {
  padding: 7px 14px; font-size: 12px; font-weight: 500;
  border-radius: 6px; border: 1px solid var(--border2); background: #141414;
  color: var(--text-dim); cursor: pointer; transition: background .12s, color .12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-sync:hover:not(:disabled) { background: #1c1c1c; color: var(--text); }
.btn-sync:disabled { opacity: .4; cursor: not-allowed; }
.sync-spinner {
  width: 10px; height: 10px; border: 2px solid #55555540;
  border-top-color: var(--text-dim); border-radius: 50%;
  animation: spin .7s linear infinite; display: none;
}
.btn-sync.syncing .sync-spinner { display: block; }
.btn-disconnect {
  padding: 7px 12px; font-size: 11px; font-weight: 500;
  border-radius: 6px; border: 1px solid #3a1a1a; background: transparent;
  color: #666; cursor: pointer; transition: color .12s, border-color .12s;
}
.btn-disconnect:hover { color: #f87171; border-color: #5a2a2a; }

/* Sync status */
.src-sync-status {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-dimmer);
  min-height: 18px;
  line-height: 1.5;
}
.src-sync-status.ok  { color: #4ade80; }
.src-sync-status.err { color: #f87171; }

/* Loading */
.loading-state { padding: 32px 0; color: #333; font-size: 13px; }

@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div class="nav">
  <span class="nav-brand">Daat</span>
  <a href="/ask"     class="nav-tab">Ask</a>
  <a href="/connect" class="nav-tab active">Connect</a>
  <span class="nav-spacer"></span>
  <button class="daat-signout" onclick="daatSignOut()">Sign out</button>
</div>

<div class="page">

  <div class="ready-banner" id="readyBanner">
    <span class="ready-text">You're set up. Start asking questions.</span>
    <a href="/ask" class="ready-link">Ask Daat →</a>
  </div>

  <div class="page-heading">
    <div class="page-title">Connect your sources</div>
    <p class="page-sub">Connect at least one source. Daat reads your data and answers questions about what's actually happening in your organization.</p>
  </div>

  <div class="sources-grid" id="sourcesGrid">
    <div class="loading-state">Loading…</div>
  </div>

</div>

<script>
const SOURCES = [
  {
    key: 'slack',        table: 'connections_slack',
    label: 'Slack',      desc: 'Messages, threads, and discussions from your workspace.',
    nameField: 'workspace_name', subField: 'workspace_domain',
    color: '#38bdf8',    ingestFn: 'slack-ingest', oauthFn: 'slack-oauth-start',
  },
  {
    key: 'notion',       table: 'connections_notion',
    label: 'Notion',     desc: 'Pages, databases, and documentation.',
    nameField: 'workspace_name', subField: 'owner_email',
    color: '#a78bfa',    ingestFn: 'notion-ingest', oauthFn: 'notion-oauth-start',
  },
  {
    key: 'quickbooks',   table: 'connections_quickbooks',
    label: 'QuickBooks', desc: 'Invoices, purchases, and financial transactions.',
    nameField: 'company_name', subField: 'company_email',
    color: '#4ade80',    ingestFn: 'quickbooks-ingest', oauthFn: 'quickbooks-oauth-start',
  },
  {
    key: 'google',       table: 'connections_google',
    label: 'Google Workspace', desc: 'Connected third-party apps and access grants.',
    nameField: 'organization_name', subField: 'domain',
    color: '#fb923c',    ingestFn: 'google-ingest', oauthFn: 'google-oauth-start',
  },
];

let _auth = null;
let BASE_HEADERS = {};

function relTime(ts) {
  if (!ts) return 'Never';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60)    return 'Just now';
  if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

function esc(s) { return s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function loadSources() {
  const grid = document.getElementById('sourcesGrid');
  try {
    const rows = await Promise.all(
      SOURCES.map(s =>
        fetch(`${SB_URL}/rest/v1/${s.table}?owner_id=eq.${_auth.workspaceId}&limit=1`, { headers: BASE_HEADERS })
          .then(r => r.json()).then(d => d[0] || null)
      )
    );

    const connectedCount = rows.filter(Boolean).length;
    document.getElementById('readyBanner').classList.toggle('visible', connectedCount > 0);

    grid.innerHTML = SOURCES.map((s, i) => {
      const conn = rows[i];
      const connected = !!conn;
      return `
      <div class="src-card ${connected ? 'connected' : ''}" id="card-${s.key}">
        <div class="src-head">
          <span class="src-name" style="color:${s.color}">${esc(s.label)}</span>
          <span class="src-badge ${connected ? 'on' : 'off'}">${connected ? 'Connected' : 'Not connected'}</span>
        </div>
        <p class="src-desc">${esc(s.desc)}</p>
        ${connected ? `
        <div class="src-meta">
          <div class="src-meta-row">
            <span class="src-meta-label">Account</span>
            <span class="src-meta-value prominent">${esc(conn[s.nameField] || '—')}</span>
          </div>
          <div class="src-meta-row">
            <span class="src-meta-label">Last synced</span>
            <span class="src-meta-value">${relTime(conn.last_synced_at)}</span>
          </div>
        </div>
        <div class="src-actions">
          <button class="btn-sync" id="sync-${s.key}" onclick="runSync('${s.key}', '${s.ingestFn}')">
            <span class="sync-spinner"></span>
            <span class="sync-label">Sync now</span>
          </button>
          <button class="btn-disconnect" onclick="disconnectSource('${s.key}', '${s.table}')">Disconnect</button>
        </div>
        <div class="src-sync-status" id="status-${s.key}"></div>
        ` : `
        <div class="src-actions">
          <button class="btn-connect" onclick="connectSource('${s.oauthFn}')">Connect ${esc(s.label)} →</button>
        </div>
        `}
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<div class="loading-state" style="color:#f87171">Failed to load connections: ${esc(e.message)}</div>`;
  }
}

function connectSource(oauthFn) {
  window.location.href = `${FN_URL}/${oauthFn}?workspace_id=${encodeURIComponent(_auth.workspaceId)}`;
}

async function disconnectSource(key, table) {
  if (!confirm(`Disconnect ${key}?\n\nThis removes the connection. You can reconnect at any time.`)) return;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?owner_id=eq.${_auth.workspaceId}`, {
      method: 'DELETE', headers: BASE_HEADERS,
    });
    if (!res.ok) throw new Error('Request failed');
    loadSources();
  } catch (e) {
    alert(`Disconnect failed: ${e.message}`);
  }
}

async function runSync(key, fnName) {
  const btn = document.getElementById(`sync-${key}`);
  const statusEl = document.getElementById(`status-${key}`);
  btn.disabled = true;
  btn.classList.add('syncing');
  statusEl.className = 'src-sync-status';
  statusEl.textContent = 'Syncing…';

  const t0 = Date.now();
  try {
    const res = await fetch(`${FN_URL}/${fnName}`, {
      method: 'POST',
      headers: { ...BASE_HEADERS, 'Content-Type': 'application/json' },
    });
    const body = await res.json().catch(() => null);
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

    if (!res.ok || !body) {
      statusEl.className = 'src-sync-status err';
      statusEl.textContent = `Sync failed — ${body?.error || 'unknown error'}`;
      return;
    }

    const ingested = body.ingested ?? 0;
    statusEl.className = 'src-sync-status ok';
    statusEl.textContent = `Synced — ${ingested} item${ingested !== 1 ? 's' : ''} imported (${elapsed}s)`;
    loadSources();
  } catch (e) {
    statusEl.className = 'src-sync-status err';
    statusEl.textContent = `Sync failed — ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('syncing');
  }
}

async function init() {
  _auth = await daatGetAuth();
  if (!_auth) return;
  BASE_HEADERS = {
    'apikey': SB_ANON,
    'Authorization': `Bearer ${_auth.token}`,
    'Content-Type': 'application/json',
  };
  loadSources();
}
init();
</script>
</body>
</html>
