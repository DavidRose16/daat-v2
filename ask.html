<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask — Daat</title>
<link rel="icon" href="/assets/Daat-Logo.png" type="image/png">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/assets/daat-ui.css">
<style>
  .ask-heading { margin-bottom: 40px; max-width: 640px; }
  .ask-heading .eyebrow { margin-bottom: 14px; }
  .ask-heading h1       { margin-bottom: 12px; }
  .ask-heading .lede    { max-width: 560px; }

  .ask-btn .btn-spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(250,250,247,0.32);
    border-top-color: var(--ink-inverse);
    border-radius: 50%;
    animation: daat-spin 0.8s linear infinite;
    display: none;
  }
  .ask-btn.running .btn-spinner { display: inline-block; }
  .ask-btn.running .btn-arrow,
  .ask-btn.running .ask-label   { display: none; }
  .ask-btn.running .running-label { display: inline; }
  .running-label { display: none; }

  /* Result surface — editorial briefing */
  .result-area { display: none; margin-top: 72px; }
  .result-area.visible { display: block; }

  .result-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .summary-text {
    font-size: 20px;
    line-height: 1.55;
    color: var(--ink);
    letter-spacing: -0.008em;
    margin-bottom: 36px;
    text-wrap: pretty;
  }

  .priority-card {
    display: none;
    background: var(--surface);
    border-left: 3px solid var(--brand-deep);
    padding: 4px 0 4px 22px;
    margin: 0 0 36px;
  }
  .priority-card.visible { display: block; }
  .priority-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brand-deep);
    margin-bottom: 8px;
  }
  .priority-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
  }

  /* Context — demoted, structured */
  details.context-details {
    margin-bottom: 28px;
    border-top: 1px solid var(--border);
  }
  details.context-details > summary {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    user-select: none;
    transition: color var(--t-fast);
  }
  details.context-details > summary:hover { color: var(--ink); }
  details.context-details > summary::-webkit-details-marker { display: none; }
  .summary-arrow {
    font-size: 13px;
    color: var(--ink-3);
    transition: transform var(--t-fast), color var(--t-fast);
    display: inline-block;
    line-height: 1;
  }
  details.context-details:hover .summary-arrow { color: var(--ink); }
  details.context-details[open] .summary-arrow { transform: rotate(90deg); }

  .context-inner {
    padding: 8px 0 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .ctx-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .ctx-list { list-style: none; display: flex; flex-direction: column; }
  .ctx-list li {
    font-size: 14px;
    color: var(--ink);
    padding: 12px 0;
    line-height: 1.55;
    border-bottom: 1px solid var(--border);
  }
  .ctx-list li:first-child { border-top: 1px solid var(--border); }
  .ctx-prose {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.7;
    padding: 0;
  }

  .result-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    padding-top: 22px;
    border-top: 1px solid var(--border);
  }
  .conf-badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    line-height: 1.2;
  }
  .conf-high   { color: var(--brand-deep); border-color: var(--brand-deep); }
  .conf-medium { color: var(--warn); border-color: #D9B778; }
  .conf-low    { color: var(--danger); border-color: #E59A94; }

  .source-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .source-tag {
    font-size: 11px;
    padding: 3px 10px;
    border: 1px solid var(--border-strong);
    color: var(--ink-3);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .error-box {
    display: none;
    border: 1px solid #E59A94;
    background: var(--danger-bg);
    color: var(--danger);
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.55;
    margin: 36px 0 0;
  }
  .error-box.visible { display: block; }

  @media (max-width: 560px) {
    .summary-text { font-size: 18px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div id="daat-shell"></div>

<main class="daat-page">

  <header class="ask-heading">
    <div class="eyebrow">Ask</div>
    <h1 class="page-title">What do you need to understand?</h1>
    <p class="lede">Describe what you want to know. Daat reads across your connected sources and returns a grounded briefing.</p>
  </header>

  <div class="composer" id="askForm">

    <div class="composer-row composer-row-inline">
      <span class="composer-label">Intent</span>
      <div class="intent-tabs" id="intentGroup" role="tablist">
        <button class="intent-tab selected" data-intent="inform"   role="tab">Inform</button>
        <button class="intent-tab"          data-intent="decide"   role="tab">Decide</button>
        <button class="intent-tab"          data-intent="diagnose" role="tab">Diagnose</button>
        <button class="intent-tab"          data-intent="plan"     role="tab">Plan</button>
      </div>
    </div>

    <div class="composer-row">
      <textarea
        class="composer-query"
        id="taskInput"
        aria-label="Your question"
        placeholder="Where are we on the billing migration, and what is still unresolved?"></textarea>
    </div>

    <div class="composer-row composer-row-inline">
      <span class="composer-label">Focus</span>
      <input
        class="composer-focus-input"
        id="entitiesInput"
        type="text"
        aria-label="People, topics, or systems"
        placeholder="acme, Q4 roadmap, sarah — comma separated (optional)">
    </div>

    <div class="composer-submit-row">
      <span class="composer-hint"><kbd>⌘</kbd><kbd>↵</kbd> to submit</span>
      <button class="btn btn-primary ask-btn" id="askBtn">
        <span class="ask-label">Ask Daat</span>
        <span class="running-label">Reading…</span>
        <span class="btn-spinner" aria-hidden="true"></span>
        <span class="btn-arrow">→</span>
      </button>
    </div>

  </div><!-- #askForm -->

  <div class="error-box" id="errorBox"></div>

  <div class="result-area" id="resultArea">
    <div class="result-eyebrow">Briefing</div>
    <p class="summary-text" id="summaryText"></p>

    <div class="priority-card" id="priorityCard">
      <div class="priority-label">Priority context</div>
      <p class="priority-text" id="priorityText"></p>
    </div>

    <details class="context-details" id="contextDetails">
      <summary><span>Context &amp; grounding</span><span class="summary-arrow">›</span></summary>
      <div class="context-inner" id="contextInner"></div>
    </details>

    <div class="result-footer" id="resultFooter"></div>
  </div>

</main>

<script>
let _auth = null;
let selectedIntent = 'inform';

async function init() {
  daatShell({ active: 'ask' });

  _auth = await daatGetAuth();
  if (!_auth) return;

  // Gate by explicit onboarding state. Only 'ready' users belong on /ask.
  if (_auth.onboardingState !== 'ready') {
    const dest =
      _auth.onboardingState === 'processing' ? '/processing' :
      _auth.onboardingState === 'connect'    ? '/connect' :
                                               '/welcome';
    window.location.replace(dest);
    return;
  }

  document.getElementById('intentGroup').addEventListener('click', e => {
    const btn = e.target.closest('.intent-tab');
    if (!btn) return;
    document.querySelectorAll('.intent-tab').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedIntent = btn.dataset.intent;
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') ask();
  });

  document.getElementById('askBtn').addEventListener('click', ask);
}

async function ask() {
  const task = document.getElementById('taskInput').value.trim();
  if (!task) return;

  const entities = document.getElementById('entitiesInput').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const btn       = document.getElementById('askBtn');
  const errorBox  = document.getElementById('errorBox');
  const resultArea = document.getElementById('resultArea');

  btn.disabled = true;
  btn.classList.add('running');
  errorBox.classList.remove('visible');
  resultArea.classList.remove('visible');

  try {
    const res = await fetch(`${FN_URL}/synthesize`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${_auth.token}`,
        'apikey': SB_ANON,
      },
      body: JSON.stringify({ task, entities, intent: selectedIntent }),
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || data.message || `HTTP ${res.status}`);

    renderResult(data);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.classList.remove('running');
  }
}

function renderResult(d) {
  const ctx = d.context || {};

  document.getElementById('summaryText').textContent = d.summary || '';

  const pc = ctx.priority_context;
  const card = document.getElementById('priorityCard');
  if (pc && typeof pc === 'string') {
    document.getElementById('priorityText').textContent = pc;
    card.classList.add('visible');
  } else {
    card.classList.remove('visible');
  }

  const inner = document.getElementById('contextInner');
  inner.innerHTML = '';

  const sections = [
    { key: 'decisions',     label: 'Decisions',    list: true  },
    { key: 'people',        label: 'People',        list: true  },
    { key: 'workflows',     label: 'Workflows',     list: true  },
    { key: 'problems',      label: 'Problems',      list: true  },
    { key: 'tacit_context', label: 'Tacit context', list: false },
    { key: 'uncertainty',   label: 'Uncertainty',   list: false },
  ];

  let hasContent = false;
  for (const s of sections) {
    const val = ctx[s.key];
    if (!val || (Array.isArray(val) && val.length === 0)) continue;
    hasContent = true;

    const wrap  = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'ctx-section-title';
    title.textContent = s.label;
    wrap.appendChild(title);

    if (s.list && Array.isArray(val)) {
      const ul = document.createElement('ul');
      ul.className = 'ctx-list';
      for (const item of val) {
        const li = document.createElement('li');
        li.textContent = typeof item === 'string' ? item : JSON.stringify(item);
        ul.appendChild(li);
      }
      wrap.appendChild(ul);
    } else if (typeof val === 'string') {
      const p = document.createElement('p');
      p.className = 'ctx-prose';
      p.textContent = val;
      wrap.appendChild(p);
    }
    inner.appendChild(wrap);
  }

  const details = document.getElementById('contextDetails');
  details.style.display = hasContent ? '' : 'none';

  const footer = document.getElementById('resultFooter');
  footer.innerHTML = '';
  if (d.confidence) {
    const badge = document.createElement('span');
    badge.className = `conf-badge conf-${d.confidence}`;
    badge.textContent = `${d.confidence} confidence`;
    footer.appendChild(badge);
  }
  if (Array.isArray(d.sources) && d.sources.length > 0) {
    const tags = document.createElement('div');
    tags.className = 'source-tags';
    for (const src of d.sources) {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = src;
      tags.appendChild(tag);
    }
    footer.appendChild(tags);
  }

  document.getElementById('resultArea').classList.add('visible');
}

init();
</script>
</body>
</html>
