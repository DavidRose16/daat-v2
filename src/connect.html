<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Integrations — DAAT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 640px;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-name {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    .badge-success {
      background: #0d2b1a;
      color: #34d47a;
      border: 1px solid #1a4d2e;
    }

    .badge-error {
      background: #2b0d0d;
      color: #f87171;
      border: 1px solid #4d1a1a;
    }

    .card-description {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    .connect-btn {
      margin-top: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .connect-btn:hover {
      background: #2a2a2a;
      border-color: #444;
    }
  </style>
</head>
<body>

  <h1>Integrations</h1>
  <p class="subtitle">Connect your tools to start ingesting data.</p>

  <div class="grid" id="grid"></div>

  <script>
    const SUPABASE = "https://wkimwkhysvvkrujsefyv.supabase.co/functions/v1";

    const integrations = [
      {
        key: "quickbooks",
        name: "QuickBooks",
        description: "Financial transactions, vendors, and company data.",
        url: `${SUPABASE}/quickbooks-oauth-start`,
      },
      {
        key: "google",
        name: "Google Workspace",
        description: "Connected apps and access patterns across your domain.",
        url: `${SUPABASE}/google-oauth-start`,
      },
      {
        key: "slack",
        name: "Slack",
        description: "Conversations, channels, and team communication.",
        url: `${SUPABASE}/slack-oauth-start`,
      },
      {
        key: "notion",
        name: "Notion",
        description: "Pages, databases, and workspace documentation.",
        url: `${SUPABASE}/notion-oauth-start`,
      },
    ];

    // Parse ?integration=X&status=Y from the URL
    const params = new URLSearchParams(window.location.search);
    const statusIntegration = params.get("integration");
    const status = params.get("status"); // "success" | "error"

    const grid = document.getElementById("grid");

    integrations.forEach(({ key, name, description, url }) => {
      const card = document.createElement("div");
      card.className = "card";

      let badgeHtml = "";
      if (statusIntegration === key && status === "success") {
        badgeHtml = `<span class="badge badge-success">Connected</span>`;
      } else if (statusIntegration === key && status === "error") {
        badgeHtml = `<span class="badge badge-error">Failed</span>`;
      }

      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${name}</span>
          ${badgeHtml}
        </div>
        <p class="card-description">${description}</p>
        <a class="connect-btn" href="${url}">Connect</a>
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
