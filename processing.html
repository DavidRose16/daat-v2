<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing your workspace — Daat</title>
<link rel="icon" href="/assets/Daat-Logo.png" type="image/png">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/assets/daat-ui.css">
<style>
  .proc-heading { margin-bottom: 44px; max-width: 640px; }
  .proc-heading .eyebrow { margin-bottom: 16px; }
  .proc-heading h1 { margin-bottom: 14px; }

  /* Source status list — soft floating rows */
  .source-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
  .source-row {
    display: flex; align-items: center; gap: 20px;
    padding: 16px 22px;
    background: var(--surface);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-0);
    transition: box-shadow var(--t-mid) var(--ease);
  }

  .source-meta { flex: 1; min-width: 0; }
  .source-name { font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.008em; }
  .source-status { font-size: 13px; color: var(--ink-3); line-height: 1.5; margin-top: 2px; letter-spacing: -0.003em; }
  .source-status.ok  { color: var(--brand-deep); }
  .source-status.err { color: var(--danger); }

  .source-indicator { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 22px; }
  .check-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--brand-tint); color: var(--brand-deep);
    font-size: 13px; font-weight: 600; line-height: 1;
  }
  .cross-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--danger-bg); color: var(--danger);
    font-size: 14px; font-weight: 600; line-height: 1;
  }

  /* Build panel — soft floating surface */
  .build-panel {
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-1);
    padding: 28px 32px;
    margin-bottom: 32px;
    transition: box-shadow var(--t-mid) var(--ease);
  }
  .build-panel.phase-hidden { display: none; }

  .build-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px; margin-bottom: 16px;
  }
  .build-label {
    font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-3);
  }
  .build-count {
    font-size: 15px; font-weight: 600; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }

  .phase-text {
    font-size: 14px; color: var(--ink-2); line-height: 1.55;
    display: flex; align-items: center; gap: 12px;
    margin-top: 20px;
    letter-spacing: -0.003em;
  }
  .phase-hidden { display: none !important; }
  .phase-error-glyph {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--danger-bg); color: var(--danger);
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }

  /* Success surface — brand-tinted soft module */
  .success-panel {
    background: linear-gradient(135deg, rgba(232, 248, 239, 0.85), rgba(214, 241, 225, 0.55));
    border-radius: var(--r-lg);
    box-shadow: inset 0 0 0 1px rgba(34, 176, 122, 0.22), var(--shadow-1);
    padding: 44px 40px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .success-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--brand-deep);
  }
  .success-eyebrow::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 0 0 4px rgba(34, 176, 122, 0.22);
  }
  .success-title {
    font-size: 26px; font-weight: 600; letter-spacing: -0.018em;
    line-height: 1.2; color: var(--ink);
  }
  .success-body { font-size: 15px; line-height: 1.65; color: var(--ink-2); }

  .error-box {
    display: none;
    background: var(--danger-bg);
    color: var(--danger);
    padding: 16px 20px;
    font-size: 14px; line-height: 1.55;
    margin-top: 20px;
    border-radius: var(--r-md);
    box-shadow: var(--shadow-0);
  }
  .error-box.visible { display: block; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div id="daat-shell"></div>

<main class="daat-page">

  <header class="proc-heading">
    <div class="eyebrow" id="pageEyebrow">Preparing your workspace</div>
    <h1 class="page-title" id="pageTitle">Daat is reading your material</h1>
    <p class="lede" id="pageSub">Pulling in what you connected and organizing it into a workspace Daat can reason over. This usually takes a minute.</p>
  </header>

  <!-- Phase 1: ingest rows -->
  <section class="source-list" id="sourceList"></section>

  <!-- Phase 2: comprehension progress -->
  <section class="build-panel phase-hidden" id="buildPanel">
    <div class="build-header">
      <span class="build-label">Comprehension</span>
      <span class="build-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-rail"><div class="progress-fill" id="progressFill"></div></div>
    <div class="phase-text" id="phaseText">
      <span class="spinner"></span>
      <span>Starting…</span>
    </div>
  </section>

  <div class="error-box" id="errorBox"></div>
</main>

<div class="action-bar">
  <span class="action-bar-status" id="continueStatus">Preparing your workspace…</span>
  <div class="action-bar-right">
    <button class="btn btn-ghost" id="secondaryBtn" style="display:none"></button>
    <button class="btn btn-primary" id="continueBtn" disabled>
      <span id="continueLabel">Enter Daat</span>
      <span class="btn-arrow" id="continueArrow">→</span>
    </button>
  </div>
</div>

<script>
const INGEST_SOURCES = [
  { key: 'slack',      table: 'connections_slack',      label: 'Slack',             ingestFn: 'slack-ingest'      },
  { key: 'notion',     table: 'connections_notion',     label: 'Notion',            ingestFn: 'notion-ingest'     },
  { key: 'quickbooks', table: 'connections_quickbooks', label: 'QuickBooks',        ingestFn: 'quickbooks-ingest' },
  { key: 'google',     table: 'connections_google',     label: 'Google Workspace',  ingestFn: 'google-ingest'     },
];

// Sources that produce comprehensions (excludes google = access).
const BUILD_SOURCES = ['slack', 'quickbooks', 'notion'];
const PER_SOURCE_LIMIT = { slack: 8, quickbooks: 8, notion: 2 };
const SOURCE_LABEL = { slack: 'Slack', quickbooks: 'QuickBooks', notion: 'Notion' };

let _auth = null;
let BASE_HEADERS = {};

function esc(s) { return s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function setPhase(text, withSpinner = true) {
  const el = document.getElementById('phaseText');
  el.innerHTML = withSpinner
    ? `<span class="spinner"></span><span>${esc(text)}</span>`
    : `<span>${esc(text)}</span>`;
}

function setProgress(done, total) {
  const pct = total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
}

function renderSourceRow(source, state, detail) {
  const row = document.getElementById(`row-${source.key}`);
  if (!row) return;
  row.className = `source-row`;
  const indicator =
    state === 'running' ? '<span class="spinner"></span>' :
    state === 'done'    ? '<span class="check-mark">✓</span>' :
    state === 'error'   ? '<span class="cross-mark">×</span>' :
    '<span class="spinner" style="opacity:.3"></span>';
  const statusText =
    state === 'waiting' ? 'Queued' :
    state === 'running' ? 'Reading…' :
    state === 'done'    ? detail :
    state === 'error'   ? detail :
    '';
  const statusClass = state === 'done' ? 'ok' : state === 'error' ? 'err' : '';
  row.innerHTML = `
    <div class="source-meta">
      <div class="source-name">${esc(source.label)}</div>
      <div class="source-status ${statusClass}">${esc(statusText)}</div>
    </div>
    <div class="source-indicator">${indicator}</div>
  `;
}

function showError(headline, detail, { allowRetry = true } = {}) {
  const phaseEl = document.getElementById('phaseText');
  if (phaseEl) {
    phaseEl.innerHTML = `<span class="phase-error-glyph">!</span><span>${esc(headline)}</span>`;
  }

  const box = document.getElementById('errorBox');
  box.textContent = detail;
  box.classList.add('visible');

  const status    = document.getElementById('continueStatus');
  const btn       = document.getElementById('continueBtn');
  const label     = document.getElementById('continueLabel');
  const arrow     = document.getElementById('continueArrow');
  const secondary = document.getElementById('secondaryBtn');

  status.textContent = headline;
  status.className = 'action-bar-status';

  if (allowRetry) {
    label.textContent = 'Retry';
    arrow.textContent = '↻';
    btn.disabled = false;
    btn.onclick = () => window.location.reload();
  } else {
    label.textContent = 'Enter Daat';
    arrow.textContent = '→';
    btn.disabled = true;
  }

  secondary.style.display = '';
  secondary.textContent = 'Back to Connect';
  secondary.onclick = () => { window.location.href = '/connect'; };
}

async function showSuccessAndAdvance(totalBuilt) {
  try { await daatSetOnboardingState(_auth, 'ready'); } catch (_) { /* proceed */ }

  document.getElementById('sourceList').classList.add('phase-hidden');
  const panel = document.getElementById('buildPanel');
  panel.classList.remove('phase-hidden');
  panel.className = 'success-panel';
  panel.innerHTML = `
    <div class="success-eyebrow">Workspace ready</div>
    <div class="success-title">Your workspace is prepared.</div>
    <div class="success-body">Daat has read and organized ${totalBuilt.toLocaleString()} item${totalBuilt !== 1 ? 's' : ''}. You can now ask it questions about your organization.</div>
  `;
  document.getElementById('pageEyebrow').textContent = 'Complete';
  document.getElementById('pageTitle').textContent = 'Your workspace is ready';
  document.getElementById('pageSub').textContent = "You're all set.";

  const status = document.getElementById('continueStatus');
  const btn = document.getElementById('continueBtn');
  status.textContent = 'Workspace built.';
  status.className = 'action-bar-status ok';
  btn.disabled = false;

  setTimeout(() => { window.location.href = '/ask'; }, 1800);
}

// ---------- Phase 1: ingest ----------

async function getConnectedSources() {
  const results = await Promise.all(
    INGEST_SOURCES.map(s =>
      fetch(`${SB_URL}/rest/v1/${s.table}?owner_id=eq.${_auth.workspaceId}&limit=1`, { headers: BASE_HEADERS })
        .then(r => r.json()).then(d => (d && d[0]) ? s : null)
    )
  );
  return results.filter(Boolean);
}

async function countSignals() {
  const { count } = await _auth.sb
    .from('signals_core')
    .select('id', { count: 'exact', head: true })
    .eq('owner_id', _auth.workspaceId);
  return count ?? 0;
}

async function countSignalsForSource(sourceKey) {
  const { count } = await _auth.sb
    .from('signals_core')
    .select('id', { count: 'exact', head: true })
    .eq('owner_id', _auth.workspaceId)
    .eq('source', sourceKey);
  return count ?? 0;
}

async function runIngest(source) {
  renderSourceRow(source, 'running');
  try {
    const res = await fetch(`${FN_URL}/${source.ingestFn}`, {
      method: 'POST',
      headers: { ...BASE_HEADERS, 'Content-Type': 'application/json' },
    });
    const body = await res.json().catch(() => null);
    if (!res.ok || !body || body.error) {
      renderSourceRow(source, 'error', body?.error || `HTTP ${res.status}`);
      return { ok: false, ingested: 0 };
    }
    const n = body.ingested ?? 0;
    renderSourceRow(source, 'done', `Imported ${n} item${n !== 1 ? 's' : ''}`);
    return { ok: true, ingested: n };
  } catch (e) {
    renderSourceRow(source, 'error', e.message);
    return { ok: false, ingested: 0 };
  }
}

async function phaseIngest() {
  const connected = await getConnectedSources();
  if (connected.length === 0) {
    showError('No connected sources.', 'Go back to Connect to add one.', { allowRetry: false });
    return { ok: false, connected: [] };
  }

  const list = document.getElementById('sourceList');
  list.innerHTML = connected.map(s => `<div class="source-row" id="row-${s.key}"></div>`).join('');
  connected.forEach(s => renderSourceRow(s, 'waiting'));

  const perSourceCounts = await Promise.all(connected.map(s => countSignalsForSource(s.key)));
  const toIngest = connected.filter((_, i) => perSourceCounts[i] === 0);
  connected.forEach((s, i) => {
    if (perSourceCounts[i] > 0) renderSourceRow(s, 'done', 'Already ingested');
  });

  if (toIngest.length === 0) {
    return { ok: true, connected };
  }

  const results = await Promise.all(toIngest.map(runIngest));
  if (!results.some(r => r.ok)) {
    showError('Ingest failed on all new sources.', 'Check the function logs for details and retry, or go back and reconnect the source.');
    return { ok: false, connected };
  }
  return { ok: true, connected };
}

// ---------- Phase 2: build ----------

async function countAssembly({ source, pendingOnly }) {
  const sourceFilter = source
    ? `&signals_core.source=eq.${source}`
    : `&signals_core.source=neq.google`;
  // Pending = still unprocessed AND not yet at the attempts cap. Rows at the
  // cap remain in the table for inspection but don't count as pending, so a
  // poison row can't hold progress hostage or trigger the stall detector.
  const pendingFilter = pendingOnly ? '&comprehended_at=is.null&attempts=lt.3' : '';
  const url = `${SB_URL}/rest/v1/comprehensions_assembly`
    + `?owner_id=eq.${_auth.workspaceId}`
    + `&select=id,signals_core!inner(source)`
    + sourceFilter
    + pendingFilter;
  const res = await fetch(url, { headers: { ...BASE_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } });
  const range = res.headers.get('content-range') || '';
  const total = parseInt(range.split('/')[1], 10);
  return isNaN(total) ? 0 : total;
}

async function countComprehensions() {
  const res = await fetch(
    `${SB_URL}/rest/v1/comprehensions_output?owner_id=eq.${_auth.workspaceId}&select=id`,
    { headers: { ...BASE_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } }
  );
  const range = res.headers.get('content-range') || '';
  const total = parseInt(range.split('/')[1], 10);
  return isNaN(total) ? 0 : total;
}

async function runComprehendBatch(source) {
  const limit = PER_SOURCE_LIMIT[source];
  const res = await fetch(`${FN_URL}/comprehend?source=${source}&limit=${limit}`, {
    method: 'POST',
    headers: { ...BASE_HEADERS, 'Content-Type': 'application/json' },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => null);
    throw new Error(body?.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function phaseBuild() {
  document.getElementById('buildPanel').classList.remove('phase-hidden');
  setPhase('Counting your signals…');

  const total = await countAssembly({ source: null, pendingOnly: false });
  if (total === 0) {
    const built = await countComprehensions();
    if (built > 0) {
      setProgress(built, built);
      await showSuccessAndAdvance(built);
      return true;
    }
    showError('No material to build with.', 'Go back and connect at least one source.', { allowRetry: false });
    return false;
  }

  let pendingAll = await countAssembly({ source: null, pendingOnly: true });
  setProgress(total - pendingAll, total);
  setPhase(`Reading ${total} item${total !== 1 ? 's' : ''}…`);

  for (const source of BUILD_SOURCES) {
    let sourcePending = await countAssembly({ source, pendingOnly: true });
    if (sourcePending === 0) continue;

    setPhase(`Reading ${SOURCE_LABEL[source]} — ${total - pendingAll} of ${total} complete.`);
    let consecutiveNoProgress = 0;

    while (sourcePending > 0) {
      try {
        const result = await runComprehendBatch(source);
        const failed = result.failed ?? 0;

        const newSourcePending = await countAssembly({ source, pendingOnly: true });
        pendingAll = await countAssembly({ source: null, pendingOnly: true });
        setProgress(total - pendingAll, total);

        if (newSourcePending === sourcePending) {
          consecutiveNoProgress++;
          if (consecutiveNoProgress >= 2) {
            if (failed > 0) {
              showError(`Build stalled on ${SOURCE_LABEL[source]}.`, `${failed} item${failed !== 1 ? 's' : ''} could not be processed. Check the function logs for details.`);
            } else {
              showError(`Build stalled on ${SOURCE_LABEL[source]}.`, 'No progress across two consecutive batches. Retry the build.');
            }
            return false;
          }
        } else {
          consecutiveNoProgress = 0;
        }

        sourcePending = newSourcePending;
        if (sourcePending > 0) {
          setPhase(`Reading ${SOURCE_LABEL[source]} — ${total - pendingAll} of ${total} complete.`);
        }
      } catch (e) {
        showError(`Build failed on ${SOURCE_LABEL[source]}.`, `${SOURCE_LABEL[source]}: ${e.message}`);
        return false;
      }
    }
  }

  setPhase('Finalizing your workspace…');
  const built = await countComprehensions();
  await showSuccessAndAdvance(built);
  return true;
}

// ---------- Controller ----------

async function init() {
  daatShell({ inFlow: true });

  _auth = await daatGetAuth();
  if (!_auth) return;

  if (_auth.onboardingState === 'welcome') {
    window.location.replace('/welcome');
    return;
  }

  BASE_HEADERS = {
    'apikey': SB_ANON,
    'Authorization': `Bearer ${_auth.token}`,
    'Content-Type': 'application/json',
  };

  document.getElementById('continueBtn').onclick = () => { window.location.href = '/ask'; };

  if (_auth.onboardingState !== 'processing') {
    try { await daatSetOnboardingState(_auth, 'processing'); } catch (_) { /* proceed */ }
  }

  // Phase 1: ingest
  document.getElementById('pageEyebrow').textContent = 'Reading';
  document.getElementById('pageTitle').textContent = 'Daat is reading your material';
  document.getElementById('pageSub').textContent = 'Pulling data from each connected source.';
  const ingestResult = await phaseIngest();
  if (!ingestResult.ok) return;

  // Phase 2: build
  document.getElementById('pageEyebrow').textContent = 'Building';
  document.getElementById('pageTitle').textContent = 'Organizing your workspace';
  document.getElementById('pageSub').textContent = 'Turning what was read into a unified workspace Daat can reason over.';
  await phaseBuild();
}
init();
</script>
</body>
</html>
