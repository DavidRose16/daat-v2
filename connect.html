<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect sources — Daat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #111;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e2e2e2;
  --text-dim: #888;
  --text-dimmer: #555;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }

/* Thin top bar */
.topbar { display: flex; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); }
.topbar-brand { font-size: 14px; font-weight: 700; letter-spacing: 0.01em; color: var(--text); }
.topbar-spacer { flex: 1; }

/* Stepper */
.stepper { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 24px 16px 0; flex-wrap: wrap; }
.step { display: flex; align-items: center; gap: 10px; }
.step-dot {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  background: #1a1a1a; color: var(--text-dimmer); border: 1px solid var(--border2);
}
.step.active .step-dot { background: #e2e2e2; color: #0f0f0f; border-color: #e2e2e2; }
.step.done   .step-dot { background: #0d2b1a; color: #4ade80; border-color: #1a4d2e; }
.step-label { font-size: 11px; color: var(--text-dimmer); letter-spacing: 0.02em; }
.step.active .step-label { color: var(--text); font-weight: 600; }
.step.done .step-label { color: #4ade80; }
.step-divider { width: 30px; height: 1px; background: var(--border2); }

/* Page */
.page { max-width: 760px; margin: 0 auto; padding: 48px 24px 120px; }
.page-heading { margin-bottom: 28px; text-align: center; }
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.015em; color: var(--text); margin-bottom: 10px; }
.page-sub { font-size: 13px; color: var(--text-dim); line-height: 1.65; max-width: 480px; margin: 0 auto; }

/* OAuth feedback banner */
.oauth-banner {
  display: none; align-items: center; gap: 12px;
  border-radius: 8px; padding: 12px 16px; margin-bottom: 24px;
  font-size: 13px;
}
.oauth-banner.visible { display: flex; }
.oauth-banner.success { background: #0d2b1a; border: 1px solid #1a4d2e; color: #4ade80; }
.oauth-banner.error   { background: #1a0808; border: 1px solid #4d1a1a; color: #f87171; }

/* Source grid */
.sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; margin-bottom: 28px; }

.src-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  transition: border-color .15s;
}
.src-card.connected { border-color: #1a3a1a; }

.src-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.src-name { font-size: 15px; font-weight: 600; color: var(--text); }
.src-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 9px;
  border-radius: 5px; white-space: nowrap;
}
.src-badge.on  { background: #0d2b1a; color: #4ade80; border: 1px solid #1a4d2e; }
.src-badge.off { background: #1a1a1a; color: #555;    border: 1px solid #2a2a2a; }

.src-desc { font-size: 12px; color: var(--text-dimmer); line-height: 1.55; margin-bottom: 14px; }

.src-meta { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.src-meta-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.src-meta-label { font-size: 11px; color: #444; }
.src-meta-value { font-size: 12px; color: var(--text-dim); text-align: right; word-break: break-all; }
.src-meta-value.prominent { color: var(--text); font-weight: 500; }

.src-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn-connect {
  padding: 7px 16px; font-size: 12px; font-weight: 600;
  border-radius: 6px; border: 1px solid #1e4d6e; background: #0a2a40;
  color: #60c8f8; cursor: pointer; transition: background .12s;
}
.btn-connect:hover { background: #0d3352; }
.btn-disconnect {
  padding: 7px 12px; font-size: 11px; font-weight: 500;
  border-radius: 6px; border: 1px solid #3a1a1a; background: transparent;
  color: #666; cursor: pointer; transition: color .12s, border-color .12s;
}
.btn-disconnect:hover { color: #f87171; border-color: #5a2a2a; }

/* Sticky footer with Continue */
.continue-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(15,15,15,0.94); backdrop-filter: blur(8px);
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.continue-status { font-size: 12px; color: var(--text-dimmer); }
.continue-status.ready { color: #4ade80; }
.continue-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 24px; background: #e2e2e2; color: #0f0f0f;
  font-size: 13px; font-weight: 600; border-radius: 8px;
  border: none; cursor: pointer; transition: background .12s, opacity .12s;
}
.continue-btn:hover:not(:disabled) { background: #fff; }
.continue-btn:disabled { opacity: .35; cursor: not-allowed; }

.secondary-link {
  background: transparent; border: none; color: var(--text-dimmer);
  font-size: 12px; cursor: pointer; padding: 6px 10px; margin-right: 4px;
  transition: color .12s;
}
.secondary-link:hover { color: var(--text-dim); }

.src-unprocessed-pill {
  display: inline-block; margin-left: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  color: #e8c97a; background: #140f00; border: 1px solid #2e2000;
  padding: 2px 7px; border-radius: 4px;
}

/* Loading */
.loading-state { padding: 32px 0; color: #333; font-size: 13px; text-align: center; }

@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Daat</span>
  <span class="topbar-spacer"></span>
  <button class="daat-signout" onclick="daatSignOut()">Sign out</button>
</div>

<div class="stepper" id="stepper">
  <div class="step done"><span class="step-dot">✓</span><span class="step-label">Welcome</span></div>
  <div class="step-divider"></div>
  <div class="step active"><span class="step-dot">2</span><span class="step-label">Connect</span></div>
  <div class="step-divider"></div>
  <div class="step"><span class="step-dot">3</span><span class="step-label">Build</span></div>
  <div class="step-divider"></div>
  <div class="step"><span class="step-dot">4</span><span class="step-label">Ask</span></div>
</div>

<div class="page">

  <div class="page-heading">
    <div class="page-title">Connect your sources</div>
    <p class="page-sub">Pick the tools Daat should learn from. You can connect one or several — Daat only reads what you grant access to.</p>
  </div>

  <div class="oauth-banner" id="oauthBanner"></div>

  <div class="sources-grid" id="sourcesGrid">
    <div class="loading-state">Loading…</div>
  </div>

</div>

<div class="continue-bar">
  <span class="continue-status" id="continueStatus">Connect at least one source to continue.</span>
  <div style="display:flex;align-items:center;gap:4px;">
    <button class="secondary-link" id="secondaryBtn" style="display:none"></button>
    <button class="continue-btn" id="continueBtn" disabled>
      <span id="continueLabel">Continue</span>
      <span>→</span>
    </button>
  </div>
</div>

<script>
const SOURCES = [
  {
    key: 'slack',        table: 'connections_slack',
    label: 'Slack',      desc: 'Messages, threads, and discussions from your workspace.',
    nameField: 'workspace_name', subField: 'workspace_domain',
    color: '#38bdf8',    oauthFn: 'slack-oauth-start',
  },
  {
    key: 'notion',       table: 'connections_notion',
    label: 'Notion',     desc: 'Pages, databases, and documentation.',
    nameField: 'workspace_name', subField: 'owner_email',
    color: '#a78bfa',    oauthFn: 'notion-oauth-start',
  },
  {
    key: 'quickbooks',   table: 'connections_quickbooks',
    label: 'QuickBooks', desc: 'Invoices, purchases, and financial transactions.',
    nameField: 'company_name', subField: 'company_email',
    color: '#4ade80',    oauthFn: 'quickbooks-oauth-start',
  },
  {
    key: 'google',       table: 'connections_google',
    label: 'Google Workspace', desc: 'Connected third-party apps and access grants.',
    nameField: 'organization_name', subField: 'domain',
    color: '#fb923c',    oauthFn: 'google-oauth-start',
  },
];

const SOURCE_LABELS = Object.fromEntries(SOURCES.map(s => [s.key, s.label]));
let _auth = null;
let BASE_HEADERS = {};
// Source-management mode is driven by explicit onboarding state, not data existence.
// A user whose workspace is 'ready' is here to manage sources, not to onboard.
let _manageMode = false;

function esc(s) { return s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function showOauthBanner() {
  const p = new URLSearchParams(window.location.search);
  const integration = p.get('integration');
  const status = p.get('status');
  if (!integration) return;
  const el = document.getElementById('oauthBanner');
  const label = SOURCE_LABELS[integration] || integration;
  if (status === 'success') {
    el.textContent = `Connected ${label} successfully.`;
    el.className = 'oauth-banner success visible';
  } else {
    el.textContent = `We couldn't connect ${label}. Try again.`;
    el.className = 'oauth-banner error visible';
  }
  // Clean URL
  history.replaceState({}, '', window.location.pathname);
}

async function countSignalsForSource(sourceKey) {
  const res = await fetch(
    `${SB_URL}/rest/v1/signals_core?owner_id=eq.${_auth.workspaceId}&source=eq.${sourceKey}&select=id`,
    { headers: { ...BASE_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } }
  );
  const range = res.headers.get('content-range') || '';
  const total = parseInt(range.split('/')[1], 10);
  return isNaN(total) ? 0 : total;
}

async function loadSources() {
  const grid = document.getElementById('sourcesGrid');
  try {
    const rows = await Promise.all(
      SOURCES.map(s =>
        fetch(`${SB_URL}/rest/v1/${s.table}?owner_id=eq.${_auth.workspaceId}&limit=1`, { headers: BASE_HEADERS })
          .then(r => r.json()).then(d => d[0] || null)
      )
    );
    const connectedCount = rows.filter(Boolean).length;

    // In manage mode, check which connected sources have never been ingested
    // (connected but zero signals) — those are "unprocessed" and surface a rebuild hint.
    let unprocessedKeys = new Set();
    if (_manageMode && connectedCount > 0) {
      const sigCounts = await Promise.all(
        SOURCES.map((s, i) => rows[i] ? countSignalsForSource(s.key) : Promise.resolve(-1))
      );
      SOURCES.forEach((s, i) => { if (sigCounts[i] === 0) unprocessedKeys.add(s.key); });
    }

    updateContinueBar(connectedCount, unprocessedKeys);

    grid.innerHTML = SOURCES.map((s, i) => {
      const conn = rows[i];
      const connected = !!conn;
      const unprocessed = unprocessedKeys.has(s.key);
      return `
      <div class="src-card ${connected ? 'connected' : ''}" id="card-${s.key}">
        <div class="src-head">
          <span class="src-name" style="color:${s.color}">${esc(s.label)}${unprocessed ? '<span class="src-unprocessed-pill">Unprocessed</span>' : ''}</span>
          <span class="src-badge ${connected ? 'on' : 'off'}">${connected ? 'Connected' : 'Not connected'}</span>
        </div>
        <p class="src-desc">${esc(s.desc)}</p>
        ${connected ? `
        <div class="src-meta">
          <div class="src-meta-row">
            <span class="src-meta-label">Account</span>
            <span class="src-meta-value prominent">${esc(conn[s.nameField] || '—')}</span>
          </div>
        </div>
        <div class="src-actions">
          <button class="btn-disconnect" onclick="disconnectSource('${s.key}', '${s.table}')">Disconnect</button>
        </div>
        ` : `
        <div class="src-actions">
          <button class="btn-connect" onclick="connectSource('${s.oauthFn}')">Connect ${esc(s.label)} →</button>
        </div>
        `}
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<div class="loading-state" style="color:#f87171">Failed to load connections: ${esc(e.message)}</div>`;
  }
}

async function startRebuild(btn) {
  btn.disabled = true;
  try {
    // Ready → processing is the explicit user-initiated rebuild transition.
    await daatSetOnboardingState(_auth, 'processing');
  } catch (e) {
    console.warn('Failed to advance onboarding_state:', e);
  }
  window.location.href = '/processing';
}

function updateContinueBar(connectedCount, unprocessedKeys) {
  const status = document.getElementById('continueStatus');
  const btn = document.getElementById('continueBtn');
  const label = document.getElementById('continueLabel');
  const secondary = document.getElementById('secondaryBtn');

  secondary.style.display = 'none';
  secondary.onclick = null;

  if (_manageMode) {
    const hasUnprocessed = unprocessedKeys && unprocessedKeys.size > 0;
    if (hasUnprocessed) {
      // Ready user added a source but it's never been ingested.
      // Primary action is rebuild. "Back to Daat" is demoted to a secondary link.
      status.textContent = `${unprocessedKeys.size} source${unprocessedKeys.size !== 1 ? 's' : ''} not yet processed.`;
      status.className = 'continue-status';
      label.textContent = 'Rebuild workspace';
      btn.disabled = false;
      btn.onclick = () => startRebuild(btn);

      secondary.textContent = 'Back to Daat';
      secondary.style.display = '';
      secondary.onclick = () => { window.location.href = '/ask'; };
      return;
    }

    // Pure management — no new work to do. Rebuild is still available as a secondary.
    status.textContent = connectedCount > 0
      ? `${connectedCount} source${connectedCount !== 1 ? 's' : ''} connected.`
      : 'No sources connected.';
    status.className = 'continue-status';
    label.textContent = 'Back to Daat';
    btn.disabled = false;
    btn.onclick = () => { window.location.href = '/ask'; };

    if (connectedCount > 0) {
      secondary.textContent = 'Rebuild workspace';
      secondary.style.display = '';
      secondary.onclick = () => startRebuild(secondary);
    }
    return;
  }

  // Onboarding mode
  if (connectedCount === 0) {
    status.textContent = 'Connect at least one source to continue.';
    status.className = 'continue-status';
    btn.disabled = true;
    label.textContent = 'Continue';
  } else {
    status.textContent = `${connectedCount} source${connectedCount !== 1 ? 's' : ''} connected. Ready when you are.`;
    status.className = 'continue-status ready';
    btn.disabled = false;
    label.textContent = 'Continue';
  }
  btn.onclick = async () => {
    btn.disabled = true;
    try {
      await daatSetOnboardingState(_auth, 'processing');
    } catch (e) {
      console.warn('Failed to advance onboarding_state:', e);
    }
    window.location.href = '/processing';
  };
}

function connectSource(oauthFn) {
  window.location.href = `${FN_URL}/${oauthFn}?workspace_id=${encodeURIComponent(_auth.workspaceId)}`;
}

async function disconnectSource(key, table) {
  if (!confirm(`Disconnect ${key}?\n\nThis removes the connection. You can reconnect at any time.`)) return;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?owner_id=eq.${_auth.workspaceId}`, {
      method: 'DELETE', headers: BASE_HEADERS,
    });
    if (!res.ok) throw new Error('Request failed');
    loadSources();
  } catch (e) {
    alert(`Disconnect failed: ${e.message}`);
  }
}

function applyManageModeChrome() {
  // In management mode the page is no longer step 2 of onboarding — hide the stepper
  // and update the heading copy so returning users don't see "your next step" framing.
  document.getElementById('stepper').style.display = 'none';
  const title = document.querySelector('.page-title');
  const sub = document.querySelector('.page-sub');
  if (title) title.textContent = 'Your sources';
  if (sub) sub.textContent = 'Connect new sources or disconnect existing ones. Changes take effect immediately.';
}

async function init() {
  _auth = await daatGetAuth();
  if (!_auth) return;
  BASE_HEADERS = {
    'apikey': SB_ANON,
    'Authorization': `Bearer ${_auth.token}`,
    'Content-Type': 'application/json',
  };
  _manageMode = _auth.onboardingState === 'ready';
  if (_manageMode) applyManageModeChrome();
  showOauthBanner();
  loadSources();
}
init();
</script>
</body>
</html>
