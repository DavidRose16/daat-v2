<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAAT Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --card: #111111;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e2e2e2;
    --text-dim: #888;
    --text-dimmer: #555;
    --slack: #38bdf8;
    --notion: #a78bfa;
    --quickbooks: #4ade80;
    --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; overflow: hidden; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .stats-bar { flex-shrink: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .filter-bar { flex-shrink: 0; background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .main-area { flex: 1; display: flex; overflow: hidden; }
  .left-panel { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: var(--card); }
  .center-panel { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
  .detail-overlay.open { pointer-events: all; opacity: 1; }
  .detail-panel { background: #131313; border: 1px solid var(--border2); border-radius: 8px 8px 0 0; width: 100%; max-width: 900px; max-height: 80vh; overflow-y: auto; padding: 20px; position: relative; }

  /* Stats bar */
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); font-family: var(--mono); }
  .stat-divider { width: 1px; background: var(--border2); height: 36px; }
  .source-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .source-pill.slack { color: var(--slack); background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); }
  .source-pill.notion { color: var(--notion); background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); }
  .source-pill.quickbooks { color: var(--quickbooks); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); }
  .stat-fields { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .field-chip { font-size: 10px; color: var(--text-dim); background: #1a1a1a; border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; font-family: var(--mono); }
  .field-chip span { color: var(--text); font-weight: 600; }

  /* Filter bar */
  .filter-bar label { font-size: 11px; color: var(--text-dim); margin-right: 4px; }
  .filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: #1a1a1a; color: var(--text-dim); cursor: pointer; transition: all 0.1s; }
  .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-btn.active.slack { border-color: var(--slack); color: var(--slack); background: rgba(56,189,248,0.1); }
  .filter-btn.active.notion { border-color: var(--notion); color: var(--notion); background: rgba(167,139,250,0.1); }
  .filter-btn.active.quickbooks { border-color: var(--quickbooks); color: var(--quickbooks); background: rgba(74,222,128,0.1); }
  .filter-btn.active.all { border-color: #555; color: var(--text); background: #222; }
  .search-input { flex: 1; min-width: 160px; max-width: 300px; background: #1a1a1a; border: 1px solid var(--border2); border-radius: 4px; color: var(--text); padding: 4px 10px; font-size: 12px; outline: none; }
  .search-input:focus { border-color: #444; }
  .search-input::placeholder { color: var(--text-dimmer); }
  .filter-sep { width: 1px; height: 20px; background: var(--border2); }
  .has-filter { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: #1a1a1a; color: var(--text-dim); cursor: pointer; transition: all 0.1s; }
  .has-filter:hover { border-color: #444; color: var(--text); }
  .has-filter.active { border-color: #888; color: var(--text); background: #222; }
  .clear-btn { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid #3a2020; background: #1a1010; color: #f87171; cursor: pointer; }
  .clear-btn:hover { background: #2a1010; }
  .result-count { font-size: 11px; color: var(--text-dimmer); margin-left: auto; font-family: var(--mono); }

  /* Left panel */
  .lp-section { border-bottom: 1px solid var(--border); }
  .lp-section-head { padding: 10px 12px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dimmer); font-weight: 600; cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; }
  .lp-section-head:hover { color: var(--text-dim); }
  .lp-section-body { padding-bottom: 4px; }
  .lp-item { display: flex; align-items: center; gap: 6px; padding: 4px 12px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.1s; }
  .lp-item:hover { background: #181818; }
  .lp-item.active { background: #1a1a1a; border-left-color: #555; }
  .lp-item-label { flex: 1; font-size: 11px; color: var(--text-dim); line-height: 1.3; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 160px; }
  .lp-item.active .lp-item-label { color: var(--text); }
  .lp-item-count { font-size: 10px; font-family: var(--mono); color: var(--text-dimmer); min-width: 18px; text-align: right; }
  .lp-source-dots { display: flex; gap: 2px; }
  .lp-dot { width: 5px; height: 5px; border-radius: 50%; }
  .lp-dot.slack { background: var(--slack); }
  .lp-dot.notion { background: var(--notion); }
  .lp-dot.quickbooks { background: var(--quickbooks); }
  .lp-collapsed .lp-section-body { display: none; }
  .lp-chevron { font-size: 9px; color: var(--text-dimmer); }

  /* Signal cards */
  .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; cursor: pointer; transition: border-color 0.1s, background 0.1s; }
  .signal-card:hover { border-color: var(--border2); background: #151515; }
  .signal-card.selected { border-color: #333; background: #161616; }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .card-badge { flex-shrink: 0; margin-top: 1px; }
  .card-purpose { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
  .card-primary { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; margin-left: 0; font-family: var(--mono); }
  .card-summary { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .card-chip { font-size: 10px; font-family: var(--mono); color: var(--text-dimmer); background: #1a1a1a; border: 1px solid var(--border); padding: 1px 6px; border-radius: 3px; }
  .card-chip.has-items { color: var(--text-dim); border-color: #2a2a2a; }
  .card-chip .chip-n { color: var(--text); font-weight: 600; }
  .card-meta { font-size: 10px; color: var(--text-dimmer); font-family: var(--mono); margin-top: 6px; }
  .no-results { color: var(--text-dimmer); font-size: 12px; text-align: center; padding: 40px 20px; }

  /* Detail panel */
  .detail-close { position: absolute; top: 16px; right: 16px; background: #1a1a1a; border: 1px solid var(--border2); color: var(--text-dim); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .detail-close:hover { color: var(--text); border-color: #444; }
  .detail-header { margin-bottom: 16px; padding-right: 36px; }
  .detail-source { margin-bottom: 8px; }
  .detail-purpose { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
  .detail-primary { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .detail-section { background: #0f0f0f; border: 1px solid var(--border); border-radius: 5px; padding: 12px; }
  .detail-section-head { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dimmer); margin-bottom: 8px; font-weight: 600; }
  .detail-items { display: flex; flex-direction: column; gap: 8px; }
  .detail-item { }
  .detail-item-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .detail-item-grounding { font-size: 10px; font-family: var(--mono); color: var(--text-dimmer); line-height: 1.4; background: #0a0a0a; padding: 4px 8px; border-radius: 3px; border-left: 2px solid #2a2a2a; }
  .detail-empty { font-size: 11px; color: var(--text-dimmer); font-style: italic; }
  .detail-prose { background: #0f0f0f; border: 1px solid var(--border); border-radius: 5px; padding: 12px; margin-bottom: 12px; }
  .detail-prose-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dimmer); margin-bottom: 6px; font-weight: 600; }
  .detail-prose-text { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .detail-id { font-size: 10px; font-family: var(--mono); color: var(--text-dimmer); margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>
<body>
<div class="app">
  <div style="padding:8px 16px;border-bottom:1px solid #1e1e1e;background:#0f0f0f">
    <a href="/" style="font-size:12px;font-weight:500;color:#555;text-decoration:none" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#555'">← Admin</a>
  </div>
  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar"></div>
  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar"></div>
  <!-- Main -->
  <div class="main-area">
    <div class="left-panel" id="leftPanel"></div>
    <div class="center-panel" id="centerPanel"></div>
  </div>
</div>
<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const SB_URL  = 'https://wkimwkhysvvkrujsefyv.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraW13a2h5c3Z2a3J1anNlZnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzA1ODMsImV4cCI6MjA4OTQ0NjU4M30.5VqJrBgElAzrkWnsT3Kza0tFlwUvYSMrv-lbgnpBymM';

let SIGNALS = [];
let AGGREGATES = {};

function computeAggregates(signals) {
  const FIELDS = ['workflows','problems','tools','decisions','people','states'];
  const source_counts = {};
  const field_totals = {};
  const label_freq_map = {};
  for (const f of FIELDS) { field_totals[f] = 0; label_freq_map[f] = {}; }

  for (const sig of signals) {
    const src = sig.source;
    source_counts[src] = (source_counts[src] || 0) + 1;
    const c = sig.comprehension;
    if (!c) continue;
    for (const f of FIELDS) {
      const items = c[f] || [];
      field_totals[f] += items.length;
      for (const item of items) {
        const lbl = item.label;
        if (!lbl) continue;
        if (!label_freq_map[f][lbl]) label_freq_map[f][lbl] = { count: 0, sources: {} };
        label_freq_map[f][lbl].count++;
        label_freq_map[f][lbl].sources[src] = (label_freq_map[f][lbl].sources[src] || 0) + 1;
      }
    }
  }

  const label_freq = {};
  for (const f of FIELDS) {
    label_freq[f] = Object.entries(label_freq_map[f])
      .map(([label, d]) => ({ label, count: d.count, sources: d.sources }))
      .sort((a, b) => b.count - a.count);
  }

  return { total_signals: signals.length, source_counts, field_totals, label_freq };
}

async function loadData() {
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = '<div style="color:#555;font-size:12px;padding:16px 0">Loading…</div>';

  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/comprehensions_output` +
      `?select=signal_id,comprehended_at,model,comprehension,signals_core(source,content_archetype,ingested_at)` +
      `&order=comprehended_at.desc`,
      { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } }
    );
    if (!res.ok) {
      const errBody = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}: ${errBody}`);
    }
    const rows = await res.json();

    if (!Array.isArray(rows)) {
      throw new Error(`Expected array, got: ${JSON.stringify(rows).slice(0, 200)}`);
    }

    SIGNALS = rows.map(r => {
      const core = Array.isArray(r.signals_core) ? r.signals_core[0] : r.signals_core;
      const comprehension = r.comprehension;
      const _field_counts = {};
      for (const f of ['workflows','problems','tools','decisions','people','states']) {
        _field_counts[f] = comprehension?.[f]?.length || 0;
      }
      return {
        signal_id:         r.signal_id,
        comprehended_at:   r.comprehended_at,
        model:             r.model,
        comprehension:     comprehension,
        source:            core?.source            || '',
        content_archetype: core?.content_archetype || '',
        ingested_at:       core?.ingested_at       || '',
        _field_counts,
      };
    });

    AGGREGATES = computeAggregates(SIGNALS);
    renderStats();
    render();
  } catch (e) {
    console.error('Explorer loadData error:', e);
    statsBar.innerHTML = `<div style="color:#f87171;font-size:12px;padding:16px 0">Failed to load: ${e.message}</div>`;
  }
}


const FIELDS = ['workflows','problems','tools','decisions','people','states'];
const FIELD_ICONS = {
  workflows: '⇄', problems: '!', tools: '◈', decisions: '◉', people: '◎', states: '◆'
};
const SOURCE_COLORS = {
  slack: 'var(--slack)', notion: 'var(--notion)', quickbooks: 'var(--quickbooks)'
};

let state = {
  sourceFilter: null,      // null = all
  hasFilter: null,         // field name or null
  searchQuery: '',
  activeLabelFilter: null, // {field, label} or null
  selectedSignalId: null
};

function sourceBadge(source, size='sm') {
  return `<span class="source-pill ${source}">${source}</span>`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) + ' ' +
    d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

function renderStats() {
  const agg = AGGREGATES;
  const s = agg.source_counts;
  const ft = agg.field_totals;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item">
      <div class="stat-label">Signals</div>
      <div class="stat-value">${agg.total_signals}</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-label">Sources</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:2px;">
        ${Object.entries(s).map(([src, cnt]) => `<span class="source-pill ${src}">${src} ${cnt}</span>`).join('')}
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-label">Extracted items</div>
      <div class="stat-fields">
        ${FIELDS.map(f => `<div class="field-chip">${f} <span>${ft[f]}</span></div>`).join('')}
      </div>
    </div>
  `;
}

function renderFilters() {
  const sources = ['slack', 'notion', 'quickbooks'];
  document.getElementById('filterBar').innerHTML = `
    <label>Source</label>
    <button class="filter-btn all ${!state.sourceFilter ? 'active' : ''}" onclick="setSource(null)">All</button>
    ${sources.map(s => `<button class="filter-btn ${s} ${state.sourceFilter===s?'active':''}" onclick="setSource('${s}')">${s}</button>`).join('')}
    <div class="filter-sep"></div>
    <label>Has</label>
    ${FIELDS.map(f => `<button class="has-filter ${state.hasFilter===f?'active':''}" onclick="setHas('${f}')">${f}</button>`).join('')}
    <div class="filter-sep"></div>
    <input class="search-input" type="text" placeholder="Search purpose, summary…" id="searchInput" value="${escHtml(state.searchQuery)}" oninput="setSearch(this.value)">
    ${(state.sourceFilter||state.hasFilter||state.searchQuery||state.activeLabelFilter) ?
      `<button class="clear-btn" onclick="clearAll()">Clear all</button>` : ''}
    <span class="result-count" id="resultCount"></span>
  `;
  // re-focus search if needed
  const si = document.getElementById('searchInput');
  if (si && document.activeElement && document.activeElement.id === 'searchInput') si.focus();
}

function setSource(s) { state.sourceFilter = s; render(); }
function setHas(f) { state.hasFilter = state.hasFilter===f ? null : f; render(); }
function setSearch(q) { state.searchQuery = q; renderSignals(); renderFilters(); }
function clearAll() { state.sourceFilter=null; state.hasFilter=null; state.searchQuery=''; state.activeLabelFilter=null; render(); }

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFilteredSignals() {
  return SIGNALS.filter(sig => {
    if (state.sourceFilter && sig.source !== state.sourceFilter) return false;
    if (state.hasFilter && (!sig.comprehension[state.hasFilter] || sig.comprehension[state.hasFilter].length===0)) return false;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      const purpose = (sig.comprehension.signal_purpose||'').toLowerCase();
      const summary = (sig.comprehension.summary||'').toLowerCase();
      if (!purpose.includes(q) && !summary.includes(q)) return false;
    }
    if (state.activeLabelFilter) {
      const {field, label} = state.activeLabelFilter;
      const items = sig.comprehension[field]||[];
      if (!items.some(i => i.label===label)) return false;
    }
    return true;
  });
}

function renderLeftPanel() {
  const agg = AGGREGATES;
  let html = '';
  for (const field of FIELDS) {
    const items = agg.label_freq[field];
    const isActive = state.activeLabelFilter && state.activeLabelFilter.field===field;
    html += `<div class="lp-section" id="lps-${field}">
      <div class="lp-section-head" onclick="toggleSection('${field}')">
        <span>${field}</span>
        <span class="lp-chevron" id="chev-${field}">▾</span>
      </div>
      <div class="lp-section-body" id="lpb-${field}">`;
    for (const item of items) {
      const active = isActive && state.activeLabelFilter.label===item.label;
      const dots = Object.entries(item.sources).map(([src,cnt]) =>
        `<span class="lp-dot ${src}" title="${src}: ${cnt}"></span>`).join('');
      html += `<div class="lp-item ${active?'active':''}" onclick="setLabelFilter('${field}','${escHtml(item.label)}')">
        <div class="lp-source-dots">${dots}</div>
        <span class="lp-item-label" title="${escHtml(item.label)}">${escHtml(item.label)}</span>
        <span class="lp-item-count">${item.count}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('leftPanel').innerHTML = html;
}

function toggleSection(field) {
  const sec = document.getElementById(`lps-${field}`);
  sec.classList.toggle('lp-collapsed');
  const chev = document.getElementById(`chev-${field}`);
  chev.textContent = sec.classList.contains('lp-collapsed') ? '▸' : '▾';
}

function setLabelFilter(field, label) {
  if (state.activeLabelFilter && state.activeLabelFilter.field===field && state.activeLabelFilter.label===label) {
    state.activeLabelFilter = null;
  } else {
    state.activeLabelFilter = {field, label};
  }
  render();
}

function renderSignals() {
  const filtered = getFilteredSignals();
  const rc = document.getElementById('resultCount');
  if (rc) rc.textContent = `${filtered.length} / ${SIGNALS.length} signals`;

  let html = '';
  if (filtered.length===0) {
    html = `<div class="no-results">No signals match the current filters.</div>`;
  } else {
    for (const sig of filtered) {
      const c = sig.comprehension;
      const selected = state.selectedSignalId===sig.signal_id;
      const chips = FIELDS.map(f => {
        const n = sig._field_counts[f]||0;
        return `<span class="card-chip ${n>0?'has-items':''}">${f.slice(0,3)} ${n>0 ? `<span class="chip-n">${n}</span>` : '0'}</span>`;
      }).join('');
      html += `<div class="signal-card ${selected?'selected':''}" onclick="openDetail('${sig.signal_id}')">
        <div class="card-top">
          <div class="card-badge">${sourceBadge(sig.source)}</div>
          <div class="card-purpose">${escHtml(c.signal_purpose||'')}</div>
        </div>
        ${c.context&&c.context.primary_label ? `<div class="card-primary">${escHtml(c.context.primary_label)}</div>` : ''}
        <div class="card-summary">${escHtml(c.summary||'')}</div>
        <div class="card-chips">${chips}</div>
        <div class="card-meta">${formatDate(sig.comprehended_at)} &middot; ${sig.model||''}</div>
      </div>`;
    }
  }
  document.getElementById('centerPanel').innerHTML = html;
}

function openDetail(signalId) {
  state.selectedSignalId = signalId;
  const sig = SIGNALS.find(s => s.signal_id===signalId);
  if (!sig) return;
  const c = sig.comprehension;
  renderSignals(); // update selected state

  let html = `<div class="detail-header">
    <div class="detail-source">${sourceBadge(sig.source)}</div>
    <div class="detail-purpose">${escHtml(c.signal_purpose||'')}</div>
    ${c.context ? `<div class="detail-primary">${escHtml(c.context.primary_label||'')}${c.context.secondary ? ' &nbsp;·&nbsp; '+escHtml(c.context.secondary) : ''}</div>` : ''}
  </div>`;

  // Summary
  html += `<div class="detail-prose">
    <div class="detail-prose-label">Summary</div>
    <div class="detail-prose-text">${escHtml(c.summary||'')}</div>
  </div>`;

  // Grid sections
  const gridFields = FIELDS;
  html += `<div class="detail-grid">`;
  for (const field of gridFields) {
    const items = c[field]||[];
    html += `<div class="detail-section">
      <div class="detail-section-head">${field}</div>
      <div class="detail-items">`;
    if (items.length===0) {
      html += `<div class="detail-empty">none extracted</div>`;
    } else {
      for (const item of items) {
        html += `<div class="detail-item">
          <div class="detail-item-label">${escHtml(item.label||'')}</div>
          <div class="detail-item-grounding">${escHtml(item.grounding||'')}</div>
        </div>`;
      }
    }
    html += `</div></div>`;
  }
  html += `</div>`;

  // Prose blocks
  if (c.uncertainty) {
    html += `<div class="detail-prose">
      <div class="detail-prose-label">Uncertainty</div>
      <div class="detail-prose-text">${escHtml(c.uncertainty)}</div>
    </div>`;
  }
  if (c.tacit) {
    html += `<div class="detail-prose">
      <div class="detail-prose-label">Tacit knowledge</div>
      <div class="detail-prose-text">${escHtml(c.tacit)}</div>
    </div>`;
  }

  // IDs
  html += `<div class="detail-id">
    signal_id: ${escHtml(sig.signal_id)} &nbsp;|&nbsp;
    ingested: ${formatDate(sig.ingested_at)} &nbsp;|&nbsp;
    comprehended: ${formatDate(sig.comprehended_at)}
  </div>`;

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
}

document.getElementById('detailClose').onclick = closeDetail;
document.getElementById('detailOverlay').onclick = function(e) {
  if (e.target===this) closeDetail();
};
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') closeDetail();
});

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  state.selectedSignalId = null;
  renderSignals();
}

function render() {
  renderFilters();
  renderLeftPanel();
  renderSignals();
}

// Init
// Init
loadData();
</script>
</body>
</html>
