<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect sources — Daat</title>
<link rel="icon" href="/assets/Daat-Logo.png" type="image/png">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/assets/daat-ui.css">
<style>
  .connect-heading { margin-bottom: 40px; }
  .connect-heading .eyebrow { margin-bottom: 16px; }
  .connect-heading h1       { margin-bottom: 14px; }
  .connect-heading .lede    { max-width: 540px; }

  .sources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }
  .src-card {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 26px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 180px;
    position: relative;
    transition: background var(--t-fast);
  }
  .src-card.connected { background: var(--surface); }
  .src-card.connected::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--brand-deep);
  }

  .src-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .src-name { font-size: 16px; font-weight: 500; color: var(--ink); letter-spacing: -0.005em; }

  .src-desc { font-size: 13px; color: var(--ink-2); line-height: 1.55; }

  .src-meta {
    display: flex; flex-direction: column; gap: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .src-meta-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .src-meta-label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; }
  .src-meta-value { font-size: 13px; color: var(--ink); text-align: right; word-break: break-all; font-weight: 500; }

  .src-actions { margin-top: auto; display: flex; gap: 10px; flex-wrap: wrap; }

  .src-unprocessed {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--warn);
    background: var(--warn-bg);
    border: 1px solid #E9D9A7;
    padding: 2px 7px;
    margin-left: 10px;
  }

  .loading-state {
    padding: 48px 24px;
    color: var(--ink-3);
    font-size: 13px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/src/auth.js"></script>
</head>
<body>

<div id="daat-shell"></div>

<main class="daat-page wide">

  <header class="connect-heading">
    <div class="eyebrow" id="pageEyebrow">Step 2 of 3</div>
    <h1 class="page-title" id="pageTitle">Choose your sources</h1>
    <p class="lede" id="pageSub">Pick the tools Daat should learn from. You can connect one or several — Daat only reads what you grant access to.</p>
  </header>

  <div class="banner" id="oauthBanner" role="status"></div>

  <div class="sources-grid" id="sourcesGrid">
    <div class="loading-state">Loading…</div>
  </div>

</main>

<div class="action-bar">
  <span class="action-bar-status" id="continueStatus">Connect at least one source to continue.</span>
  <div class="action-bar-right">
    <button class="btn btn-ghost" id="secondaryBtn" style="display:none"></button>
    <button class="btn btn-primary" id="continueBtn" disabled>
      <span id="continueLabel">Continue</span>
      <span class="btn-arrow">→</span>
    </button>
  </div>
</div>

<script>
const SOURCES = [
  {
    key: 'slack',        table: 'connections_slack',
    label: 'Slack',      desc: 'Messages, threads, and discussions from your workspace.',
    nameField: 'workspace_name', subField: 'workspace_domain',
    oauthFn: 'slack-oauth-start',
  },
  {
    key: 'notion',       table: 'connections_notion',
    label: 'Notion',     desc: 'Pages, databases, and documentation.',
    nameField: 'workspace_name', subField: 'owner_email',
    oauthFn: 'notion-oauth-start',
  },
  {
    key: 'quickbooks',   table: 'connections_quickbooks',
    label: 'QuickBooks', desc: 'Invoices, purchases, and financial transactions.',
    nameField: 'company_name', subField: 'company_email',
    oauthFn: 'quickbooks-oauth-start',
  },
  {
    key: 'google',       table: 'connections_google',
    label: 'Google Workspace', desc: 'Connected third-party apps and access grants.',
    nameField: 'organization_name', subField: 'domain',
    oauthFn: 'google-oauth-start',
  },
];

const SOURCE_LABELS = Object.fromEntries(SOURCES.map(s => [s.key, s.label]));
let _auth = null;
let BASE_HEADERS = {};
// Source-management mode is driven by explicit onboarding state, not data existence.
// A user whose workspace is 'ready' is here to manage sources, not to onboard.
let _manageMode = false;

function esc(s) { return s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function showOauthBanner() {
  const p = new URLSearchParams(window.location.search);
  const integration = p.get('integration');
  const status = p.get('status');
  if (!integration) return;
  const el = document.getElementById('oauthBanner');
  const label = SOURCE_LABELS[integration] || integration;
  if (status === 'success') {
    el.textContent = `Connected ${label} successfully.`;
    el.className = 'banner banner-ok visible';
  } else {
    el.textContent = `We couldn't connect ${label}. Try again.`;
    el.className = 'banner banner-error visible';
  }
  history.replaceState({}, '', window.location.pathname);
}

async function countSignalsForSource(sourceKey) {
  const res = await fetch(
    `${SB_URL}/rest/v1/signals_core?owner_id=eq.${_auth.workspaceId}&source=eq.${sourceKey}&select=id`,
    { headers: { ...BASE_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } }
  );
  const range = res.headers.get('content-range') || '';
  const total = parseInt(range.split('/')[1], 10);
  return isNaN(total) ? 0 : total;
}

async function loadSources() {
  const grid = document.getElementById('sourcesGrid');
  try {
    const rows = await Promise.all(
      SOURCES.map(s =>
        fetch(`${SB_URL}/rest/v1/${s.table}?owner_id=eq.${_auth.workspaceId}&limit=1`, { headers: BASE_HEADERS })
          .then(r => r.json()).then(d => d[0] || null)
      )
    );
    const connectedCount = rows.filter(Boolean).length;

    let unprocessedKeys = new Set();
    if (_manageMode && connectedCount > 0) {
      const sigCounts = await Promise.all(
        SOURCES.map((s, i) => rows[i] ? countSignalsForSource(s.key) : Promise.resolve(-1))
      );
      SOURCES.forEach((s, i) => { if (sigCounts[i] === 0) unprocessedKeys.add(s.key); });
    }

    updateContinueBar(connectedCount, unprocessedKeys);

    grid.innerHTML = SOURCES.map((s, i) => {
      const conn = rows[i];
      const connected = !!conn;
      const unprocessed = unprocessedKeys.has(s.key);
      return `
      <div class="src-card ${connected ? 'connected' : ''}" id="card-${s.key}">
        <div class="src-head">
          <span class="src-name">${esc(s.label)}${unprocessed ? '<span class="src-unprocessed">Unprocessed</span>' : ''}</span>
          <span class="badge ${connected ? 'badge-ok' : 'badge-neutral'}">${connected ? 'Connected' : 'Not connected'}</span>
        </div>
        <p class="src-desc">${esc(s.desc)}</p>
        ${connected ? `
        <div class="src-meta">
          <div class="src-meta-row">
            <span class="src-meta-label">Account</span>
            <span class="src-meta-value">${esc(conn[s.nameField] || '—')}</span>
          </div>
        </div>
        <div class="src-actions">
          <button class="btn btn-ghost" onclick="disconnectSource('${s.key}', '${s.table}')">Disconnect</button>
        </div>
        ` : `
        <div class="src-actions">
          <button class="btn btn-secondary" onclick="connectSource('${s.oauthFn}')">Connect ${esc(s.label)}</button>
        </div>
        `}
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<div class="loading-state" style="color:var(--danger)">Failed to load connections: ${esc(e.message)}</div>`;
  }
}

async function startRebuild(btn) {
  btn.disabled = true;
  try {
    await daatSetOnboardingState(_auth, 'processing');
  } catch (e) {
    console.warn('Failed to advance onboarding_state:', e);
  }
  window.location.href = '/processing';
}

function updateContinueBar(connectedCount, unprocessedKeys) {
  const status = document.getElementById('continueStatus');
  const btn = document.getElementById('continueBtn');
  const label = document.getElementById('continueLabel');
  const secondary = document.getElementById('secondaryBtn');

  secondary.style.display = 'none';
  secondary.onclick = null;

  if (_manageMode) {
    const hasUnprocessed = unprocessedKeys && unprocessedKeys.size > 0;
    if (hasUnprocessed) {
      status.textContent = `${unprocessedKeys.size} source${unprocessedKeys.size !== 1 ? 's' : ''} not yet processed.`;
      status.className = 'action-bar-status';
      label.textContent = 'Rebuild workspace';
      btn.disabled = false;
      btn.onclick = () => startRebuild(btn);

      secondary.textContent = 'Back to Daat';
      secondary.style.display = '';
      secondary.onclick = () => { window.location.href = '/ask'; };
      return;
    }

    status.textContent = connectedCount > 0
      ? `${connectedCount} source${connectedCount !== 1 ? 's' : ''} connected.`
      : 'No sources connected.';
    status.className = 'action-bar-status';
    label.textContent = 'Back to Daat';
    btn.disabled = false;
    btn.onclick = () => { window.location.href = '/ask'; };

    if (connectedCount > 0) {
      secondary.textContent = 'Rebuild workspace';
      secondary.style.display = '';
      secondary.onclick = () => startRebuild(secondary);
    }
    return;
  }

  if (connectedCount === 0) {
    status.textContent = 'Connect at least one source to continue.';
    status.className = 'action-bar-status';
    btn.disabled = true;
    label.textContent = 'Continue';
  } else {
    status.textContent = `${connectedCount} source${connectedCount !== 1 ? 's' : ''} connected. Ready when you are.`;
    status.className = 'action-bar-status ok';
    btn.disabled = false;
    label.textContent = 'Continue';
  }
  btn.onclick = async () => {
    btn.disabled = true;
    try {
      await daatSetOnboardingState(_auth, 'processing');
    } catch (e) {
      console.warn('Failed to advance onboarding_state:', e);
    }
    window.location.href = '/processing';
  };
}

function connectSource(oauthFn) {
  window.location.href = `${FN_URL}/${oauthFn}?workspace_id=${encodeURIComponent(_auth.workspaceId)}`;
}

async function disconnectSource(key, table) {
  if (!confirm(`Disconnect ${key}?\n\nThis removes the connection. You can reconnect at any time.`)) return;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?owner_id=eq.${_auth.workspaceId}`, {
      method: 'DELETE', headers: BASE_HEADERS,
    });
    if (!res.ok) throw new Error('Request failed');
    loadSources();
  } catch (e) {
    alert(`Disconnect failed: ${e.message}`);
  }
}

function applyManageModeChrome() {
  document.getElementById('pageEyebrow').textContent = 'Sources';
  document.getElementById('pageTitle').textContent = 'Your sources';
  document.getElementById('pageSub').textContent = 'Connect new sources or disconnect existing ones. Changes take effect immediately.';
}

async function init() {
  _auth = await daatGetAuth();
  if (!_auth) return;
  BASE_HEADERS = {
    'apikey': SB_ANON,
    'Authorization': `Bearer ${_auth.token}`,
    'Content-Type': 'application/json',
  };
  _manageMode = _auth.onboardingState === 'ready';
  // In onboarding, hide primary nav and keep the focused flow chrome.
  // In manage mode, show full nav with Connect active.
  daatShell({ active: _manageMode ? 'connect' : null, inFlow: !_manageMode });
  if (_manageMode) applyManageModeChrome();
  showOauthBanner();
  loadSources();
}
init();
</script>
</body>
</html>
